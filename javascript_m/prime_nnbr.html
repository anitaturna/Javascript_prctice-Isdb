<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>prime number</title>
  </head>
  <body>
    <script>
      let num = parseInt(prompt("Enter a number to chaeck prime"));
      let count = 0;
      if (num <= 1) {
        count = 1;
      }
      for (let i = 2; i <= num/2; i++) {
        if (num % i === 0) {
          count++;
          break;
        }
      }
      if (count === 0) {
       document.write("this is prime");
      } 
      else {
        document.write("this is not prime");
      }
    </script>
  </body>
</html>
